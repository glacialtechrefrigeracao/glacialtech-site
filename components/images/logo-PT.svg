<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Fundo circular preto -->
  <circle cx="250" cy="250" r="248" fill="#000000"/>
  <!-- Borda tracejada -->
  <circle cx="250" cy="250" r="205" fill="none" stroke="#ffffff" stroke-width="2"
          stroke-dasharray="26 20" stroke-opacity="0.85"/>
  <!-- Letras PT em azul com contorno duplo -->
  <text x="250" y="330" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="230"
        fill="#35bcff" stroke="#0a5c86" stroke-width="4"
        letter-spacing="6">PT</text>
</svg>
